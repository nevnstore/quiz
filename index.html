<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEVN OMEGA GALAXY</title>

<style>

/* ===============================
   GLOBAL RESET
================================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Segoe UI, sans-serif;
    color:white;
}

/* ===============================
   UNIVERSE LAYERS
================================= */

#universe{
    position:relative;
    width:100vw;
    height:100vh;
}

.layer{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

#nebula{
    background:
        radial-gradient(circle at 20% 30%, rgba(138,43,226,0.35), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,191,255,0.35), transparent 50%),
        radial-gradient(circle at 50% 50%, #000 60%);
    animation:nebulaSpin 180s linear infinite;
    z-index:0;
}

@keyframes nebulaSpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

#stars{
    z-index:1;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

#planets{
    z-index:2;
}

.planet{
    position:absolute;
    border-radius:50%;
    box-shadow:0 0 30px rgba(0,255,255,0.7);
}

/* ===============================
   UI PANEL
================================= */

#ui{
    z-index:3;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#title{
    font-size:4rem;
    background:linear-gradient(90deg,#00f0ff,#ff00ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#subtitle{
    opacity:0.7;
    margin-top:20px;
}

/* ===============================
   DATA GRID
================================= */

#dataPanel{
    position:absolute;
    bottom:0;
    width:100%;
    max-height:40%;
    overflow:auto;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    padding:20px;
}

.dataRow{
    display:flex;
    justify-content:space-between;
    padding:5px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:12px;
}

</style>
</head>
<body>

<div id="universe">

    <div id="nebula" class="layer"></div>
    <div id="stars" class="layer"></div>
    <div id="planets" class="layer"></div>

    <div id="ui" class="layer">
        <div id="title">OMEGA GALAXY</div>
        <div id="subtitle">Powered by NEVN Engine</div>
    </div>

    <div id="dataPanel"></div>

</div>

<script>

/* =================================
   CORE UNIVERSE OBJECT
==================================== */

const Universe = {
    width: window.innerWidth,
    height: window.innerHeight,
    starCount: 1200,
    planetCount: 25,
    sectors: 300,
    init(){
        this.generateStars();
        this.generatePlanets();
        this.generateSectors();
    }
};

window.addEventListener("resize",()=>{
    Universe.width = window.innerWidth;
    Universe.height = window.innerHeight;
});

/* =================================
   STAR ENGINE
==================================== */

Universe.generateStars = function(){

    const starLayer = document.getElementById("stars");

    for(let i=0;i<this.starCount;i++){

        const star = document.createElement("div");
        star.classList.add("star");

        const size = Math.random()*3;

        star.style.width = size+"px";
        star.style.height = size+"px";

        star.style.top = Math.random()*100+"%";
        star.style.left = Math.random()*100+"%";

        star.style.animationDuration = (Math.random()*3+2)+"s";

        starLayer.appendChild(star);
    }
};

/* =================================
   PLANET SYSTEM
==================================== */

Universe.generatePlanets = function(){

    const planetLayer = document.getElementById("planets");

    for(let i=0;i<this.planetCount;i++){

        const planet = document.createElement("div");
        planet.classList.add("planet");

        const size = Math.random()*80+20;

        planet.style.width = size+"px";
        planet.style.height = size+"px";

        planet.style.background =
            "radial-gradient(circle at 30% 30%, #00f0ff, #001aff)";

        planet.style.top = Math.random()*90+"%";
        planet.style.left = Math.random()*90+"%";

        planet.style.opacity = Math.random()*0.8+0.2;

        planetLayer.appendChild(planet);
    }
};

/* =================================
   SECTOR DATA GENERATOR
==================================== */

Universe.generateSectors = function(){

    const panel = document.getElementById("dataPanel");

    for(let i=1;i<=this.sectors;i++){

        const row = document.createElement("div");
        row.classList.add("dataRow");

        const energy = Math.floor(Math.random()*10000);
        const stars = Math.floor(Math.random()*5000);
        const stability = Math.floor(Math.random()*100);

        row.innerHTML = `
            <div>Sector ${i}</div>
            <div>Energy: ${energy}</div>
            <div>Stars: ${stars}</div>
            <div>Stability: ${stability}%</div>
        `;

        panel.appendChild(row);
    }
};

/* =================================
   PARTICLE TRAIL
==================================== */

document.addEventListener("mousemove",(e)=>{

    const p = document.createElement("div");

    p.style.position="fixed";
    p.style.width="4px";
    p.style.height="4px";
    p.style.background="cyan";
    p.style.borderRadius="50%";
    p.style.left=e.clientX+"px";
    p.style.top=e.clientY+"px";
    p.style.pointerEvents="none";
    p.style.boxShadow="0 0 10px cyan";

    document.body.appendChild(p);

    setTimeout(()=>{p.remove();},400);
});

/* =================================
   INITIALIZE
==================================== */

Universe.init();
/* =================================
   BLACK HOLE ENGINE
==================================== */

Universe.blackHoles = [];

Universe.generateBlackHoles = function(){

    for(let i=0;i<3;i++){

        const hole = document.createElement("div");

        hole.style.position = "absolute";
        hole.style.width = "120px";
        hole.style.height = "120px";
        hole.style.borderRadius = "50%";
        hole.style.background = "radial-gradient(circle, #000 40%, purple 70%, transparent 80%)";
        hole.style.boxShadow = "0 0 60px purple";
        hole.style.top = Math.random()*80+"%";
        hole.style.left = Math.random()*80+"%";
        hole.style.zIndex = 5;

        document.getElementById("planets").appendChild(hole);

        Universe.blackHoles.push({
            el: hole,
            x: hole.offsetLeft,
            y: hole.offsetTop
        });
    }
};

Universe.applyGravity = function(){

    const planets = document.querySelectorAll(".planet");

    planets.forEach(p=>{

        Universe.blackHoles.forEach(hole=>{

            const dx = hole.x - p.offsetLeft;
            const dy = hole.y - p.offsetTop;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 300){

                const force = (300 - dist) / 300;

                p.style.left = (p.offsetLeft + dx*0.001*force) + "px";
                p.style.top  = (p.offsetTop + dy*0.001*force) + "px";
            }
        });
    });

    requestAnimationFrame(Universe.applyGravity);
};

/* =================================
   ASTEROID BELT SYSTEM
==================================== */

Universe.generateAsteroids = function(){

    const layer = document.getElementById("planets");

    for(let i=0;i<400;i++){

        const rock = document.createElement("div");

        rock.style.position = "absolute";
        rock.style.width = Math.random()*6+"px";
        rock.style.height = rock.style.width;
        rock.style.background = "gray";
        rock.style.borderRadius = "50%";
        rock.style.top = Math.random()*100+"%";
        rock.style.left = Math.random()*100+"%";
        rock.style.opacity = Math.random()*0.8;

        layer.appendChild(rock);
    }
};

/* =================================
   WARP SPEED MODE
==================================== */

Universe.warpActive = false;

Universe.activateWarp = function(){

    Universe.warpActive = true;

    const stars = document.querySelectorAll(".star");

    stars.forEach(s=>{
        s.style.height = "20px";
        s.style.width = "2px";
        s.style.background = "white";
        s.style.animationDuration = "0.1s";
    });

    document.body.style.background = "black";
};

Universe.deactivateWarp = function(){

    Universe.warpActive = false;

    const stars = document.querySelectorAll(".star");

    stars.forEach(s=>{
        const size = Math.random()*3;
        s.style.width = size+"px";
        s.style.height = size+"px";
        s.style.animationDuration = (Math.random()*3+2)+"s";
    });

    document.body.style.background =
        "radial-gradient(circle at center, #0b001a 0%, #000 70%)";
};

document.addEventListener("keydown",(e)=>{
    if(e.key==="w"){
        Universe.activateWarp();
    }
    if(e.key==="s"){
        Universe.deactivateWarp();
    }
});

/* =================================
   DEPTH PARALLAX SYSTEM
==================================== */

document.addEventListener("mousemove",(e)=>{

    const x = e.clientX / Universe.width - 0.5;
    const y = e.clientY / Universe.height - 0.5;

    document.getElementById("nebula").style.transform =
        "translate("+x*30+"px,"+y*30+"px) rotate(0deg)";

    document.getElementById("stars").style.transform =
        "translate("+x*60+"px,"+y*60+"px)";
});

/* =================================
   UNIVERSE EXPANDER
==================================== */

Universe.expandUniverse = function(layers){

    for(let i=0;i<layers;i++){

        const line = document.createElement("div");

        line.style.height = "1px";
        line.style.width = "100%";
        line.style.background = "rgba(255,255,255,0.01)";
        line.style.margin = "1px 0";

        document.body.appendChild(line);
    }
};

/* =================================
   ADVANCED SECTOR SIMULATION
==================================== */

Universe.simulateEnergyFlow = function(){

    const rows = document.querySelectorAll(".dataRow");

    setInterval(()=>{

        rows.forEach(row=>{

            const energy = Math.floor(Math.random()*10000);
            const stability = Math.floor(Math.random()*100);

            row.children[1].innerText = "Energy: " + energy;
            row.children[3].innerText = "Stability: " + stability + "%";

        });

    },2000);
};

/* =================================
   INITIALIZE ADVANCED SYSTEMS
==================================== */

Universe.generateBlackHoles();
Universe.generateAsteroids();
Universe.applyGravity();
Universe.simulateEnergyFlow();

/* =================================
   AUTO EXPANSION BOOST
==================================== */

/*
Kalau mau bikin ribuan elemen tambahan,
ubah angka di bawah ini.
*/

Universe.expandUniverse(2000);
/* =================================
   SUPERNOVA SYSTEM
==================================== */

Universe.triggerSupernova = function(){

    const planets = document.querySelectorAll(".planet");

    if(planets.length === 0) return;

    const randomPlanet = planets[Math.floor(Math.random()*planets.length)];

    const explosion = document.createElement("div");
    explosion.style.position = "absolute";
    explosion.style.borderRadius = "50%";
    explosion.style.background = "radial-gradient(circle, white, orange, red, transparent)";
    explosion.style.width = "10px";
    explosion.style.height = "10px";
    explosion.style.left = randomPlanet.offsetLeft + "px";
    explosion.style.top = randomPlanet.offsetTop + "px";
    explosion.style.zIndex = 10;

    document.getElementById("planets").appendChild(explosion);

    let size = 10;

    const expand = setInterval(()=>{
        size += 15;
        explosion.style.width = size + "px";
        explosion.style.height = size + "px";
        explosion.style.opacity = 1 - size/600;

        if(size > 600){
            clearInterval(expand);
            explosion.remove();
            randomPlanet.remove();
        }
    },30);
};

/* =================================
   PLANET COLLISION SYSTEM
==================================== */

Universe.checkCollisions = function(){

    const planets = document.querySelectorAll(".planet");

    for(let i=0;i<planets.length;i++){
        for(let j=i+1;j<planets.length;j++){

            const p1 = planets[i];
            const p2 = planets[j];

            const dx = p1.offsetLeft - p2.offsetLeft;
            const dy = p1.offsetTop - p2.offsetTop;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 40){
                p1.style.background = "red";
                p2.style.background = "red";
            }
        }
    }

    requestAnimationFrame(Universe.checkCollisions);
};

Universe.checkCollisions();

/* =================================
   SHOCKWAVE EFFECT
==================================== */

Universe.createShockwave = function(x,y){

    const wave = document.createElement("div");

    wave.style.position="absolute";
    wave.style.border="2px solid cyan";
    wave.style.borderRadius="50%";
    wave.style.left=x+"px";
    wave.style.top=y+"px";
    wave.style.width="20px";
    wave.style.height="20px";
    wave.style.opacity=1;

    document.body.appendChild(wave);

    let size=20;

    const anim=setInterval(()=>{
        size+=20;
        wave.style.width=size+"px";
        wave.style.height=size+"px";
        wave.style.opacity-=0.05;

        if(wave.style.opacity<=0){
            clearInterval(anim);
            wave.remove();
        }
    },30);
};

document.addEventListener("click",(e)=>{
    Universe.createShockwave(e.clientX,e.clientY);
});

/* =================================
   PROCEDURAL SPIRAL GALAXY
==================================== */

Universe.generateSpiralGalaxy = function(starCount){

    const starLayer = document.getElementById("stars");

    for(let i=0;i<starCount;i++){

        const angle = i * 0.3;
        const radius = i * 0.5;

        const x = Universe.width/2 + Math.cos(angle)*radius;
        const y = Universe.height/2 + Math.sin(angle)*radius;

        const star = document.createElement("div");
        star.classList.add("star");

        star.style.width="2px";
        star.style.height="2px";
        star.style.left=x+"px";
        star.style.top=y+"px";

        starLayer.appendChild(star);
    }
};

Universe.generateSpiralGalaxy(800);

/* =================================
   GALAXY AI CONTROLLER
==================================== */

Universe.galaxyBrain = function(){

    setInterval(()=>{

        const randomEvent = Math.random();

        if(randomEvent < 0.3){
            Universe.triggerSupernova();
        }

        if(randomEvent > 0.7){
            Universe.expandUniverse(200);
        }

    },5000);
};

Universe.galaxyBrain();
/* =================================
   ADVANCED PHYSICS ENGINE
==================================== */

Universe.physicsPlanets = [];

Universe.initPhysicsPlanets = function(){

    const planets = document.querySelectorAll(".planet");

    planets.forEach(p=>{

        Universe.physicsPlanets.push({
            el: p,
            x: p.offsetLeft,
            y: p.offsetTop,
            vx: (Math.random()-0.5)*2,
            vy: (Math.random()-0.5)*2,
            mass: Math.random()*5 + 1
        });

    });
};

Universe.timeScale = 1;

Universe.updatePhysics = function(){

    for(let i=0;i<Universe.physicsPlanets.length;i++){

        const p1 = Universe.physicsPlanets[i];

        for(let j=i+1;j<Universe.physicsPlanets.length;j++){

            const p2 = Universe.physicsPlanets[j];

            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dist = Math.sqrt(dx*dx + dy*dy) + 0.1;

            const force = (p1.mass * p2.mass) / (dist * 200);

            const fx = force * dx / dist;
            const fy = force * dy / dist;

            p1.vx += fx / p1.mass;
            p1.vy += fy / p1.mass;

            p2.vx -= fx / p2.mass;
            p2.vy -= fy / p2.mass;
        }
    }

    Universe.physicsPlanets.forEach(p=>{

        p.x += p.vx * Universe.timeScale;
        p.y += p.vy * Universe.timeScale;

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";

    });

    requestAnimationFrame(Universe.updatePhysics);
};

/* =================================
   TIME CONTROL SYSTEM
==================================== */

document.addEventListener("keydown",(e)=>{

    if(e.key==="1") Universe.timeScale = 0.5;
    if(e.key==="2") Universe.timeScale = 1;
    if(e.key==="3") Universe.timeScale = 2;
    if(e.key==="4") Universe.timeScale = 5;

});

/* =================================
   BLACK HOLE EVENT HORIZON
==================================== */

Universe.animateBlackHoles = function(){

    Universe.blackHoles.forEach(h=>{

        h.el.style.animation = "spinHole 4s linear infinite";

    });
};

const style = document.createElement("style");
style.innerHTML = `
@keyframes spinHole{
    from{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(180deg) scale(1.1);}
    to{transform:rotate(360deg) scale(1);}
}
`;
document.head.appendChild(style);

/* =================================
   FPS OPTIMIZER ENGINE
==================================== */

Universe.optimizePerformance = function(){

    let lastTime = performance.now();

    function checkFPS(){

        const now = performance.now();
        const fps = 1000 / (now - lastTime);
        lastTime = now;

        if(fps < 30){
            Universe.timeScale = 0.7;
        }

        requestAnimationFrame(checkFPS);
    }

    checkFPS();
};

/* =================================
   ORBITAL AUTO ROTATION SYSTEM
==================================== */

Universe.createOrbitalRing = function(){

    const centerX = Universe.width/2;
    const centerY = Universe.height/2;

    Universe.physicsPlanets.forEach((p,i)=>{

        const angle = i * 0.5;
        const radius = 200 + i*5;

        p.x = centerX + Math.cos(angle)*radius;
        p.y = centerY + Math.sin(angle)*radius;

        p.vx = -Math.sin(angle)*1.5;
        p.vy = Math.cos(angle)*1.5;
    });
};

/* =================================
   INITIALIZE ADVANCED MODE
==================================== */

Universe.initPhysicsPlanets();
Universe.createOrbitalRing();
Universe.animateBlackHoles();
Universe.updatePhysics();
Universe.optimizePerformance();
/* =================================
   STAR BIRTH SYSTEM
==================================== */

Universe.spawnNewStar = function(x,y){

    const star = document.createElement("div");
    star.classList.add("star");

    star.style.width="3px";
    star.style.height="3px";
    star.style.left=x+"px";
    star.style.top=y+"px";
    star.style.background="cyan";

    document.getElementById("stars").appendChild(star);

};

Universe.starFactory = function(){

    setInterval(()=>{
        const x = Math.random()*Universe.width;
        const y = Math.random()*Universe.height;
        Universe.spawnNewStar(x,y);
    },300);

};

Universe.starFactory();

/* =================================
   BLACK HOLE ABSORB EFFECT
==================================== */

Universe.absorbNearbyStars = function(){

    const stars = document.querySelectorAll(".star");

    stars.forEach(s=>{

        Universe.blackHoles.forEach(h=>{

            const dx = h.el.offsetLeft - s.offsetLeft;
            const dy = h.el.offsetTop - s.offsetTop;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 150){
                s.style.opacity = 0.2;
                if(dist < 40){
                    s.remove();
                }
            }

        });

    });

    requestAnimationFrame(Universe.absorbNearbyStars);
};

Universe.absorbNearbyStars();

/* =================================
   COMET ENGINE
==================================== */

Universe.spawnComet = function(){

    const comet = document.createElement("div");

    comet.style.position="absolute";
    comet.style.width="6px";
    comet.style.height="6px";
    comet.style.borderRadius="50%";
    comet.style.background="white";
    comet.style.boxShadow="0 0 20px white";

    let x=0;
    let y=Math.random()*Universe.height;

    comet.style.left=x+"px";
    comet.style.top=y+"px";

    document.body.appendChild(comet);

    const move=setInterval(()=>{

        x+=10;
        y+=2;

        comet.style.left=x+"px";
        comet.style.top=y+"px";

        if(x>Universe.width){
            clearInterval(move);
            comet.remove();
        }

    },30);

};

setInterval(()=>{
    Universe.spawnComet();
},4000);

/* =================================
   METEOR SHOWER MODE
==================================== */

Universe.meteorShower = function(){

    for(let i=0;i<50;i++){
        setTimeout(()=>{
            Universe.spawnComet();
        },i*100);
    }

};

document.addEventListener("keydown",(e)=>{
    if(e.key==="m"){
        Universe.meteorShower();
    }
});

/* =================================
   GALAXY PULSE EFFECT
==================================== */

Universe.pulseGalaxy = function(){

    let scale=1;

    setInterval(()=>{

        scale = scale===1 ? 1.05 : 1;

        document.getElementById("nebula").style.transform =
            "scale("+scale+")";

    },2000);

};

Universe.pulseGalaxy();

/* =================================
   AUTO SECTOR EXPANSION SYSTEM
==================================== */

Universe.massiveSectorExpansion = function(count){

    const panel=document.getElementById("dataPanel");

    for(let i=0;i<count;i++){

        const row=document.createElement("div");
        row.classList.add("dataRow");

        row.innerHTML=`
            <div>Deep Sector ${Math.floor(Math.random()*10000)}</div>
            <div>Energy: ${Math.floor(Math.random()*99999)}</div>
            <div>Stars: ${Math.floor(Math.random()*50000)}</div>
            <div>Stability: ${Math.floor(Math.random()*100)}%</div>
        `;

        panel.appendChild(row);
    }

};

Universe.massiveSectorExpansion(500);
/* =================================
   BIG BANG SYSTEM
==================================== */

Universe.bigBang = function(){

    document.body.style.transition="all 0.5s";
    document.body.style.background="white";

    setTimeout(()=>{

        document.body.style.background="black";

        document.getElementById("stars").innerHTML="";
        document.getElementById("planets").innerHTML="";
        document.getElementById("dataPanel").innerHTML="";

        Universe.generateStars();
        Universe.generatePlanets();
        Universe.generateSectors();

    },800);
};

document.addEventListener("keydown",(e)=>{
    if(e.key==="b"){
        Universe.bigBang();
    }
});

/* =================================
   UNIVERSE COLLAPSE MODE
==================================== */

Universe.collapseUniverse = function(){

    const all = document.querySelectorAll(".planet,.star");

    all.forEach(el=>{

        el.style.transition="all 2s";
        el.style.left=Universe.width/2+"px";
        el.style.top=Universe.height/2+"px";
        el.style.opacity=0;

    });

};

document.addEventListener("keydown",(e)=>{
    if(e.key==="c"){
        Universe.collapseUniverse();
    }
});

/* =================================
   MASS SUCTION EFFECT
==================================== */

Universe.massSuction = function(){

    const centerX=Universe.width/2;
    const centerY=Universe.height/2;

    const all=document.querySelectorAll(".planet,.star");

    all.forEach(el=>{

        const dx=centerX-el.offsetLeft;
        const dy=centerY-el.offsetTop;

        el.style.left=el.offsetLeft+dx*0.05+"px";
        el.style.top=el.offsetTop+dy*0.05+"px";

    });

    requestAnimationFrame(Universe.massSuction);
};

document.addEventListener("keydown",(e)=>{
    if(e.key==="g"){
        Universe.massSuction();
    }
});

/* =================================
   TIME REWIND VISUAL
==================================== */

Universe.timeRewindEffect=function(){

    document.body.style.animation="rewind 2s linear";

};

const rewindStyle=document.createElement("style");
rewindStyle.innerHTML=`
@keyframes rewind{
    0%{filter:hue-rotate(0deg);}
    50%{filter:hue-rotate(180deg);}
    100%{filter:hue-rotate(360deg);}
}
`;
document.head.appendChild(rewindStyle);

document.addEventListener("keydown",(e)=>{
    if(e.key==="r"){
        Universe.timeRewindEffect();
    }
});

/* =================================
   SPACE DISTORTION WAVE
==================================== */

Universe.spaceDistortion=function(){

    let scale=1;

    const interval=setInterval(()=>{

        scale+=0.02;
        document.getElementById("universe").style.transform=
            "scale("+scale+") rotate("+scale*10+"deg)";

        if(scale>2){
            clearInterval(interval);
            document.getElementById("universe").style.transform="scale(1) rotate(0deg)";
        }

    },30);
};

document.addEventListener("keydown",(e)=>{
    if(e.key==="d"){
        Universe.spaceDistortion();
    }
});

/* =================================
   MULTI-LAYER STAR DEPTH ENGINE
==================================== */

Universe.generateDepthStars=function(layers){

    const starLayer=document.getElementById("stars");

    for(let l=0;l<layers;l++){

        for(let i=0;i<200;i++){

            const star=document.createElement("div");
            star.classList.add("star");

            const size=Math.random()*2+(l*0.5);

            star.style.width=size+"px";
            star.style.height=size+"px";

            star.style.left=Math.random()*Universe.width+"px";
            star.style.top=Math.random()*Universe.height+"px";

            star.style.opacity=1-(l*0.2);

            starLayer.appendChild(star);
        }

    }
};

Universe.generateDepthStars(3);
/* ===============================
   GALAXY WORMHOLE SYSTEM
=================================*/

class Wormhole {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 40 + Math.random() * 60;
        this.angle = 0;
    }

    draw(ctx) {
        this.angle += 0.05;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        for (let i = 0; i < 20; i++) {
            ctx.beginPath();
            ctx.arc(0, 0, this.radius - i * 2, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(100,0,255,${0.05 + i * 0.02})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        ctx.restore();
    }

    affect(particles) {
        particles.forEach(p => {
            let dx = this.x - p.x;
            let dy = this.y - p.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 200) {
                p.vx += dx * 0.00005;
                p.vy += dy * 0.00005;
            }
        });
    }
}

let wormholes = [];

function spawnWormhole() {
    wormholes.push(new Wormhole(
        Math.random() * canvas.width,
        Math.random() * canvas.height
    ));
}

setInterval(spawnWormhole, 8000);


/* ===============================
   METEOR SHOWER SYSTEM
=================================*/

class Meteor {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.vx = -2 + Math.random() * 4;
        this.vy = 4 + Math.random() * 3;
        this.size = 2 + Math.random() * 3;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "orange";
        ctx.fill();
    }
}

let meteors = [];

function spawnMeteor() {
    meteors.push(new Meteor());
}

setInterval(spawnMeteor, 300);


/* ===============================
   STAR PULSE ENGINE
=================================*/

function pulseStars(particles) {
    let time = Date.now() * 0.002;

    particles.forEach(p => {
        p.size = 1.5 + Math.sin(time + p.x * 0.01) * 1.2;
    });
}


/* ===============================
   DARK ENERGY WAVE
=================================*/

function darkEnergyWave(particles) {
    let time = Date.now() * 0.001;

    particles.forEach(p => {
        p.x += Math.sin(time + p.y * 0.002) * 0.3;
        p.y += Math.cos(time + p.x * 0.002) * 0.3;
    });
}


/* ===============================
   COSMIC RENDER LOOP EXTENSION
=================================*/

function extendedRender() {

    wormholes.forEach(w => {
        w.draw(ctx);
        w.affect(Universe.particles);
    });

    meteors.forEach((m, index) => {
        m.update();
        m.draw(ctx);

        if (m.y > canvas.height + 50) {
            meteors.splice(index, 1);
        }
    });

    pulseStars(Universe.particles);
    darkEnergyWave(Universe.particles);

    requestAnimationFrame(extendedRender);
}

extendedRender();


/* ===============================
   GALAXY AUTO EVOLUTION
=================================*/

setInterval(() => {
    Universe.expandUniverse(200);
}, 15000);


/* ===============================
   INTERACTIVE CLICK EXPLOSION
=================================*/

canvas.addEventListener("click", (e) => {

        Universe.particles.push({

            vx: (Math.random() - 0.5) * 6,

            size: 2,

        });
    }

});


/* ===============================
   GALAXY STATUS LOGGER
=================================*/

setInterval(() => {
    console.log("Particles:", Universe.particles.length);
    console.log("Wormholes:", wormholes.length);
    console.log("Meteors:", meteors.length);
}, 10000);


/* ===============================
   COSMIC HUM SIMULATION
=================================*/

let humLevel = 0;

function cosmicHum() {
    humLevel += 0.01;
    let intensity = Math.abs(Math.sin(humLevel));

    document.body.style.boxShadow =
        `inset 0 0 ${50 + intensity * 100}px rgba(50,0,100,0.5)`;

    requestAnimationFrame(cosmicHum);
}

cosmicHum();
/* =========================================
   ALIEN FLEET INVASION SYSTEM
=========================================*/

class AlienShip {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -100;
        this.vx = -1 + Math.random() * 2;
        this.vy = 1 + Math.random() * 2;
        this.size = 20;
        this.health = 100;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        // zigzag movement
        this.x += Math.sin(Date.now() * 0.002) * 1.5;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "lime";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
        ctx.fillStyle = "cyan";
        ctx.fill();

        ctx.restore();
    }
}

let alienFleet = [];

function spawnAlien() {
    alienFleet.push(new AlienShip());
}

setInterval(spawnAlien, 7000);


/* =========================================
   LASER DEFENSE SYSTEM
=========================================*/

class Laser {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vy = -8;
    }

    update() {
        this.y += this.vy;
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.rect(this.x - 2, this.y - 20, 4, 20);
        ctx.fillStyle = "red";
        ctx.fill();
    }
}

let lasers = [];

canvas.addEventListener("mousemove", (e) => {
    lasers.push(new Laser(e.clientX, canvas.height - 10));
});


/* =========================================
   SUPERNOVA CHAIN REACTION
=========================================*/

function supernova(x, y) {
    for (let i = 0; i < 200; i++) {
        Universe.particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            size: 2 + Math.random() * 3,
            color: "orange"
        });
    }
}

function checkCollisions() {
    lasers.forEach((laser, li) => {
        alienFleet.forEach((alien, ai) => {
            let dx = laser.x - alien.x;
            let dy = laser.y - alien.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < alien.size) {
                supernova(alien.x, alien.y);
                alienFleet.splice(ai, 1);
                lasers.splice(li, 1);
            }
        });
    });
}


/* =========================================
   QUANTUM TIME DISTORTION
=========================================*/

let timeWarp = false;

setInterval(() => {
    timeWarp = !timeWarp;
}, 20000);

function applyTimeWarp() {
    if (timeWarp) {
        Universe.particles.forEach(p => {
            p.x += p.vx * 2;
            p.y += p.vy * 2;
        });
    }
}


/* =========================================
   COSMIC WAR RENDER LOOP EXTENSION
=========================================*/

function warRender() {

    alienFleet.forEach(alien => {
        alien.update();
        alien.draw(ctx);
    });

    lasers.forEach((laser, index) => {
        laser.update();
        laser.draw(ctx);

        if (laser.y < 0) {
            lasers.splice(index, 1);
        }
    });

    checkCollisions();
    applyTimeWarp();

    requestAnimationFrame(warRender);
}

warRender();


/* =========================================
   GALAXY POWER METER
=========================================*/

let power = 0;

setInterval(() => {
    power += 10;
    if (power > 1000) power = 0;
}, 3000);

function drawPowerMeter() {
    ctx.save();
    ctx.fillStyle = "white";
    ctx.fillText("GALAXY POWER: " + power, 20, 40);
    ctx.restore();
}

setInterval(drawPowerMeter, 1000);
